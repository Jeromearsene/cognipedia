name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Lint
            command: pnpm lint
          - name: Type check
            command: pnpm check
          - name: Test
            command: pnpm test
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: ${{ matrix.command }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          BRANCH=${{ github.head_ref || github.ref_name }}
          OUTPUT=$(pnpm wrangler pages deploy dist/ --project-name cognipedia --branch "$BRANCH" --commit-dirty=true 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.pages\.dev' | head -1)
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  lighthouse:
    name: Lighthouse
    needs: [build]
    uses: ./.github/workflows/lighthouse.yml
    with:
      port: 8788
      upload: true

  lighthouse-baseline:
    name: Lighthouse (baseline)
    needs: [check]
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/lighthouse.yml
    with:
      port: 8789
      ref: ${{ github.base_ref }}

  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [deploy, lighthouse, lighthouse-baseline]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Compute baseline
        id: baseline
        uses: actions/github-script@v7
        env:
          LH_BASE_MANIFEST: ${{ needs.lighthouse-baseline.outputs.manifest }}
        with:
          result-encoding: string
          script: |
            const manifest = JSON.parse(process.env.LH_BASE_MANIFEST || '[]');
            const byUrl = {};
            for (const entry of manifest) {
              const url = entry.url.replace(/http:\/\/localhost:\d+/, '');
              if (!byUrl[url]) byUrl[url] = [];
              byUrl[url].push(entry.summary);
            }
            const baseline = {};
            for (const [url, runs] of Object.entries(byUrl)) {
              const avg = (key) => Math.round(runs.reduce((s, r) => s + r[key], 0) / runs.length * 100);
              baseline[url] = {
                performance: avg('performance'),
                accessibility: avg('accessibility'),
                seo: avg('seo'),
                'best-practices': avg('best-practices'),
              };
            }
            return JSON.stringify(baseline);
      - name: Format Lighthouse scores
        id: scores
        uses: actions/github-script@v7
        env:
          LH_MANIFEST: ${{ needs.lighthouse.outputs.manifest }}
          LH_LINKS: ${{ needs.lighthouse.outputs.links }}
          LH_BASELINE: ${{ steps.baseline.outputs.result }}
        with:
          script: |
            const fs = require('fs');
            const script = fs.readFileSync('.github/scripts/format-lighthouse.js', 'utf8');
            eval(script);

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-summary
          message: |
            <!-- ci-summary -->
            ## CI Summary

            ### Preview
            ${{ needs.deploy.outputs.deployment-url || 'No preview (deploy skipped)' }}

            ### Lighthouse (average of 3 runs, compared to ${{ github.base_ref }})
            ${{ steps.scores.outputs.table }}
